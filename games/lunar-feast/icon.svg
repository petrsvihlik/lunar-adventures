<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#3a2a8a"/>
      <stop offset="60%" stop-color="#1a1850"/>
      <stop offset="100%" stop-color="#0a0a3a"/>
    </radialGradient>
    <radialGradient id="moon" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#fff5d6"/>
      <stop offset="60%" stop-color="#ffe6a8"/>
      <stop offset="100%" stop-color="#ffc880"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe6a8" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#ffe6a8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)" rx="96"/>

  <g fill="white" opacity="0.85">
    <circle cx="80"  cy="100" r="2.6"/>
    <circle cx="430" cy="120" r="3"/>
    <circle cx="60"  cy="400" r="2.6"/>
    <circle cx="450" cy="420" r="3"/>
    <circle cx="180" cy="60"  r="2"/>
    <circle cx="320" cy="450" r="2.4"/>
  </g>

  <!-- moon halo -->
  <circle cx="256" cy="276" r="220" fill="url(#halo)"/>

  <!-- moon body -->
  <circle cx="256" cy="276" r="155" fill="url(#moon)"/>

  <!-- closed-happy eyes (yum face) -->
  <path d="M 196 254 Q 218 240 240 254" stroke="#3a2a5a" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M 272 254 Q 294 240 316 254" stroke="#3a2a5a" stroke-width="7" fill="none" stroke-linecap="round"/>

  <!-- blush -->
  <circle cx="178" cy="290" r="14" fill="#ffb3d9" opacity="0.6"/>
  <circle cx="334" cy="290" r="14" fill="#ffb3d9" opacity="0.6"/>

  <!-- open mouth (oval) -->
  <ellipse cx="256" cy="328" rx="36" ry="26" fill="#5a2a4a"/>
  <ellipse cx="256" cy="338" rx="22" ry="12" fill="#ff7eb0" opacity="0.9"/>

  <!-- star going into mouth -->
  <g fill="#ffe6a8">
    <path d="M 256 178 l 14 42 l 42 14 l -42 14 l -14 42 l -14 -42 l -42 -14 l 42 -14 z"/>
  </g>

  <!-- glint -->
  <ellipse cx="218" cy="226" rx="34" ry="18" fill="white" opacity="0.35"/>
</svg>
