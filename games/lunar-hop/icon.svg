<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#3a2a8a"/>
      <stop offset="60%" stop-color="#1a1850"/>
      <stop offset="100%" stop-color="#0a0a3a"/>
    </radialGradient>
    <radialGradient id="moonA" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#e0f0ff"/>
      <stop offset="60%" stop-color="#a8d8ff"/>
      <stop offset="100%" stop-color="#6fb0f0"/>
    </radialGradient>
    <radialGradient id="moonB" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#ffe0ec"/>
      <stop offset="60%" stop-color="#ffb3d1"/>
      <stop offset="100%" stop-color="#ff7eb0"/>
    </radialGradient>
    <radialGradient id="glowA" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a8d8ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#a8d8ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffb3d1" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffb3d1" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)" rx="96"/>
  <g fill="white" opacity="0.85">
    <circle cx="80"  cy="120" r="2.6"/>
    <circle cx="430" cy="100" r="3"/>
    <circle cx="60"  cy="400" r="2.6"/>
    <circle cx="450" cy="420" r="3"/>
    <circle cx="200" cy="60"  r="2"/>
    <circle cx="300" cy="430" r="2.4"/>
  </g>

  <!-- arc trail showing hop motion -->
  <path d="M 140 380 Q 256 100 380 180" stroke="#ffe6a8" stroke-width="3" fill="none"
        stroke-linecap="round" stroke-dasharray="2 14" opacity="0.85"/>

  <!-- bottom moon (start) -->
  <circle cx="140" cy="380" r="100" fill="url(#glowA)"/>
  <circle cx="140" cy="380" r="72" fill="url(#moonA)"/>
  <circle cx="120" cy="370" r="9" fill="#3a2a5a"/>
  <circle cx="158" cy="370" r="9" fill="#3a2a5a"/>
  <path d="M 116 398 Q 140 416 164 398" stroke="#c75c8c" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- top-right moon (target) -->
  <circle cx="380" cy="180" r="110" fill="url(#glowB)"/>
  <circle cx="380" cy="180" r="80" fill="url(#moonB)"/>
  <circle cx="358" cy="168" r="10" fill="#3a2a5a"/>
  <circle cx="400" cy="168" r="10" fill="#3a2a5a"/>
  <path d="M 354 198 Q 380 218 406 198" stroke="#c75c8c" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- sparkle at the apex -->
  <g fill="#ffe6a8">
    <path d="M 256 156 l 6 18 l 18 6 l -18 6 l -6 18 l -6 -18 l -18 -6 l 18 -6 z"/>
  </g>
</svg>
