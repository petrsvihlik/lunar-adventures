<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#3a2a8a"/>
      <stop offset="60%" stop-color="#1a1850"/>
      <stop offset="100%" stop-color="#0a0a3a"/>
    </radialGradient>
    <radialGradient id="moonPink" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#ffe0ec"/>
      <stop offset="60%" stop-color="#ffb3d1"/>
      <stop offset="100%" stop-color="#ff7eb0"/>
    </radialGradient>
    <linearGradient id="cardBack" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a1f6a"/>
      <stop offset="100%" stop-color="#15124a"/>
    </linearGradient>
    <linearGradient id="cardPink" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5a3060" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#3a1f4a" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)" rx="96"/>

  <g fill="white" opacity="0.85">
    <circle cx="70"  cy="90"  r="2.6"/>
    <circle cx="440" cy="120" r="3"/>
    <circle cx="60"  cy="420" r="2.6"/>
    <circle cx="460" cy="400" r="3"/>
    <circle cx="200" cy="60"  r="2"/>
    <circle cx="320" cy="450" r="2.4"/>
  </g>

  <!-- Top-left: face-up pink moon -->
  <g>
    <rect x="78"  y="120" width="160" height="160" rx="28" fill="url(#cardPink)" stroke="#ff7eb0" stroke-width="4"/>
    <circle cx="158" cy="200" r="56" fill="url(#moonPink)"/>
    <circle cx="142" cy="192" r="6" fill="#3a2a5a"/>
    <circle cx="174" cy="192" r="6" fill="#3a2a5a"/>
    <path d="M 138 215 Q 158 230 178 215" stroke="#c75c8c" stroke-width="4" fill="none" stroke-linecap="round"/>
    <circle cx="120" cy="208" r="8" fill="#ff8fcf" opacity="0.55"/>
    <circle cx="196" cy="208" r="8" fill="#ff8fcf" opacity="0.55"/>
  </g>

  <!-- Top-right: face-up pink moon (matching) -->
  <g>
    <rect x="274" y="120" width="160" height="160" rx="28" fill="url(#cardPink)" stroke="#ff7eb0" stroke-width="4"/>
    <circle cx="354" cy="200" r="56" fill="url(#moonPink)"/>
    <circle cx="338" cy="192" r="6" fill="#3a2a5a"/>
    <circle cx="370" cy="192" r="6" fill="#3a2a5a"/>
    <path d="M 334 215 Q 354 230 374 215" stroke="#c75c8c" stroke-width="4" fill="none" stroke-linecap="round"/>
    <circle cx="316" cy="208" r="8" fill="#ff8fcf" opacity="0.55"/>
    <circle cx="392" cy="208" r="8" fill="#ff8fcf" opacity="0.55"/>
  </g>

  <!-- Heart between them -->
  <path d="M 256 100 C 246 80 218 80 218 102 C 218 122 256 142 256 142 C 256 142 294 122 294 102 C 294 80 266 80 256 100 Z" fill="#ff7eb0"/>

  <!-- Bottom-left: face-down card with sparkle -->
  <g>
    <rect x="78"  y="316" width="160" height="160" rx="28" fill="url(#cardBack)" stroke="#ffe6a8" stroke-width="4" stroke-opacity="0.55"/>
    <path d="M 158 358 l 8 26 l 26 8 l -26 8 l -8 26 l -8 -26 l -26 -8 l 26 -8 z" fill="#ffe6a8"/>
    <circle cx="108" cy="346" r="2" fill="white" opacity="0.7"/>
    <circle cx="208" cy="446" r="2.5" fill="white" opacity="0.7"/>
  </g>

  <!-- Bottom-right: face-down card with sparkle -->
  <g>
    <rect x="274" y="316" width="160" height="160" rx="28" fill="url(#cardBack)" stroke="#ffe6a8" stroke-width="4" stroke-opacity="0.55"/>
    <path d="M 354 358 l 8 26 l 26 8 l -26 8 l -8 26 l -8 -26 l -26 -8 l 26 -8 z" fill="#ffe6a8"/>
    <circle cx="304" cy="446" r="2" fill="white" opacity="0.7"/>
    <circle cx="408" cy="346" r="2.5" fill="white" opacity="0.7"/>
  </g>
</svg>
