<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#3a2a8a"/>
      <stop offset="60%" stop-color="#1a1850"/>
      <stop offset="100%" stop-color="#0a0a3a"/>
    </radialGradient>
    <radialGradient id="moon" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#fff5d6"/>
      <stop offset="60%" stop-color="#ffe6a8"/>
      <stop offset="100%" stop-color="#ffc880"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe6a8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffe6a8" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="m1"><circle cx="116" cy="256" r="58"/></clipPath>
    <clipPath id="m2"><circle cx="232" cy="256" r="58"/></clipPath>
    <clipPath id="m3"><circle cx="348" cy="256" r="58"/></clipPath>
    <clipPath id="m4"><circle cx="464" cy="256" r="58"/></clipPath>
  </defs>
  <rect width="512" height="512" fill="url(#bg)" rx="96"/>

  <g fill="white" opacity="0.85">
    <circle cx="60"  cy="100" r="2.6"/>
    <circle cx="430" cy="80"  r="3"/>
    <circle cx="50"  cy="430" r="2.6"/>
    <circle cx="460" cy="430" r="3"/>
    <circle cx="200" cy="60"  r="2"/>
    <circle cx="320" cy="450" r="2.4"/>
    <circle cx="100" cy="380" r="1.6"/>
    <circle cx="410" cy="380" r="2"/>
  </g>

  <!-- Halos -->
  <circle cx="116" cy="256" r="84" fill="url(#halo)" opacity="0.5"/>
  <circle cx="232" cy="256" r="84" fill="url(#halo)" opacity="0.7"/>
  <circle cx="348" cy="256" r="84" fill="url(#halo)" opacity="0.85"/>
  <circle cx="464" cy="256" r="84" fill="url(#halo)"/>

  <!-- Phase 1: waxing crescent -->
  <g clip-path="url(#m1)">
    <rect x="58" y="198" width="116" height="116" fill="url(#moon)"/>
    <!-- shadow: left + ellipse bowing right (rx=0.7r=40.6) -->
    <path d="M 116 198 A 58 58 0 0 0 116 314 A 40.6 58 0 0 0 116 198 Z" fill="#15124a" opacity="0.92"/>
  </g>
  <circle cx="116" cy="256" r="58" fill="none" stroke="#ffe6a8" stroke-width="2" stroke-opacity="0.55"/>

  <!-- Phase 2: first quarter (right half lit) -->
  <g clip-path="url(#m2)">
    <rect x="174" y="198" width="116" height="116" fill="url(#moon)"/>
    <rect x="174" y="198" width="58"  height="116" fill="#15124a" opacity="0.92"/>
  </g>
  <circle cx="232" cy="256" r="58" fill="none" stroke="#ffe6a8" stroke-width="2" stroke-opacity="0.55"/>

  <!-- Phase 3: waxing gibbous -->
  <g clip-path="url(#m3)">
    <rect x="290" y="198" width="116" height="116" fill="url(#moon)"/>
    <!-- shadow: thin sliver on left, ellipse bowing left -->
    <path d="M 348 198 A 58 58 0 0 0 348 314 A 40.6 58 0 0 1 348 198 Z" fill="#15124a" opacity="0.92"/>
  </g>
  <circle cx="348" cy="256" r="58" fill="none" stroke="#ffe6a8" stroke-width="2" stroke-opacity="0.55"/>

  <!-- Phase 4: full -->
  <circle cx="464" cy="256" r="58" fill="url(#moon)"/>
  <circle cx="464" cy="256" r="58" fill="none" stroke="#ffe6a8" stroke-width="2" stroke-opacity="0.55"/>

  <!-- Tiny smiley on the full moon -->
  <circle cx="450" cy="248" r="5" fill="#3a2a5a"/>
  <circle cx="478" cy="248" r="5" fill="#3a2a5a"/>
  <path d="M 446 270 Q 464 282 482 270" stroke="#c75c8c" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Dotted progression line under the row -->
  <g fill="#ffe6a8" opacity="0.7">
    <circle cx="160" cy="354" r="2.5"/>
    <circle cx="190" cy="354" r="2.5"/>
    <circle cx="220" cy="354" r="2.5"/>
    <circle cx="276" cy="354" r="2.5"/>
    <circle cx="306" cy="354" r="2.5"/>
    <circle cx="336" cy="354" r="2.5"/>
    <circle cx="392" cy="354" r="2.5"/>
    <circle cx="422" cy="354" r="2.5"/>
  </g>
  <!-- Sparkle near the full moon -->
  <path d="M 410 178 l 5 14 l 14 5 l -14 5 l -5 14 l -5 -14 l -14 -5 l 14 -5 z" fill="#ffe6a8"/>
</svg>
